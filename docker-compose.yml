services:
  rss-reader:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_DSN: "rss_user:rss_pass@tcp(mysql:3306)/rss_reader?charset=utf8mb4&parseTime=True"
      JWT_SECRET: "change-me-in-production"
      PORT: "8080"
    working_dir: /
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: rss_reader
      MYSQL_USER: rss_user
      MYSQL_PASSWORD: rss_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
